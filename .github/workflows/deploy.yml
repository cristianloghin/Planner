name: Deploy

# One pipeline per push to main: apply DB migrations FIRST, then build and
# deploy the site. Gating the build on `migrate` means the frontend never goes
# live against a schema that hasn't been updated yet.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize the whole pipeline. cancel-in-progress is OFF so a newer push can't
# interrupt an in-flight `supabase db push` mid-migration.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # Gate the whole pipeline on the unit suite. Reuses the exact job from test.yml
  # (workflow_call) so there's one source of truth, and nothing below — not even
  # the DB migration — runs until tests pass.
  test:
    uses: ./.github/workflows/test.yml

  # Apply any new supabase/migrations/*.sql to the hosted database. `db push` is
  # idempotent — it only runs migrations not already recorded remotely — so this
  # is a fast no-op on app-only pushes and safe to run every time.
  migrate:
    needs: test
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v2
        with:
          # Pass the token so version resolution isn't rate-limited.
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
      - run: supabase db push

  build:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Vite inlines these at build time. The publishable key is client-safe
          # (it ships in the bundle to every visitor; RLS protects the data), so
          # they live as public repository variables, not secrets.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # VAPID *public* key for Web Push — client-safe by design (the
          # private half lives with the sender, never here). Unset = the
          # notifications section simply doesn't render.
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
