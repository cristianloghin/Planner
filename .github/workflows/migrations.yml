name: Deploy Supabase migrations

# Apply any new supabase/migrations/*.sql to the hosted database. `db push` is
# idempotent — it only runs migrations not already recorded remotely — so
# re-runs are safe. Scoped to migration changes so ordinary app pushes skip it.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migrations.yml'
  workflow_dispatch:

# One migration run at a time; never apply two schema changes concurrently.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v2
        with:
          # Pass the token so version resolution isn't rate-limited.
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
      - run: supabase db push
